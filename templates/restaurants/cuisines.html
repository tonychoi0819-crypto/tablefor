 "base.html" %}
 title { All %} Cuisines — {{ site_name }}{ %}
 content %}
<div class="container py-5">
    <h2 class="section-title">🍜 All Cuisines</h2>
    <div class="row g-3">
        { c in cuisines %}
        <div class="col-6 col-md-4 col-lg-3">
            <a href="/search/?cuisine={{ c.name_en }}" class="text-decoration-none">
                <div class="district-card">
                    <div class="cuisine-icon">{{ c.icon|default:"🍽️" }}</div>
                    <div class="name mt-2">{{ c.name_en }}</div>
                    <small class="text-muted">{{ c.restaurants.count }} restaurants</small>
                </div>
            </a>
        </div>
        { %}
    </div>
</div>
 %}
