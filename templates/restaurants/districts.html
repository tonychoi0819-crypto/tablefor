 "base.html" %}
 title { All %} Districts — {{ site_name }}{ %}
 content %}
<div class="container py-5">
    <h2 class="section-title">📍 All Districts</h2>
    {% regroup districts by get_region_display as regions %}
    { region in regions %}
    <h5 class="mt-4 mb-3" style="font-weight:700;color:var(--tf-red);">{{ region.grouper }}</h5>
    <div class="row g-3">
        { d in region.list %}
        <div class="col-6 col-md-4 col-lg-3">
            <a href="/search/?district={{ d.name_en }}" class="text-decoration-none">
                <div class="district-card">
                    <div class="count">{{ d.restaurants.count }}</div>
                    <div class="name">{{ d.name_en }}</div>
                </div>
            </a>
        </div>
        { %}
    </div>
    { %}
</div>
 %}
