 "base.html" %}
 title { Login %} — {{ site_name }}{ %}
 content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm" style="border-radius:16px;padding:30px;">
                <h3 style="font-weight:700;text-align:center;">Welcome Back</h3>
                <p class="text-muted text-center">Login to your TableFor account</p>
                <form method="post">
                    { %}
                    { form.errors %}
                    <div class="alert alert-danger">Invalid username or password.</div>
                    { %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <p class="text-center mt-3 text-muted small">Don't have an account? <a href="{ 'accounts:register' %}">Sign up</a></p>
            </div>
        </div>
    </div>
</div>
 %}
