{% extends "base.html" %}
{% block title %}Write a Review — {{ site_name }}{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <h3 style="font-weight:700;">Write a Review</h3>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Rating</label>
                    <select name="rating" class="form-select" required>
                        <option value="5">5 - Excellent</option>
                        <option value="4">4 - Very Good</option>
                        <option value="3">3 - Average</option>
                        <option value="2">2 - Poor</option>
                        <option value="1">1 - Terrible</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Title</label>
                    <input type="text" name="title" class="form-control" required placeholder="Summarize your experience">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Your Review</label>
                    <textarea name="body" class="form-control" rows="5" required placeholder="Tell others about your experience..."></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Meal Type</label>
                        <select name="meal_type" class="form-select">
                            <option value="">Select...</option>
                            <option value="breakfast">Breakfast</option>
                            <option value="lunch">Lunch</option>
                            <option value="dinner">Dinner</option>
                            <option value="brunch">Brunch</option>
                            <option value="tea">Afternoon Tea</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Party Size</label>
                        <input type="number" name="party_size" class="form-control" min="1" max="20" value="2">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Submit Review</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
